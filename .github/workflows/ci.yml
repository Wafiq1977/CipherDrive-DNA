# ============================================================
# CipherDrive-DNA MVP — Continuous Integration
# ============================================================
# Builds the project with Maven on every push / pull request to main,
# runs unit tests, and uploads the built JAR as a build artifact.
# ============================================================

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel superseded runs on the same ref to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21' ]

    steps:

      # ── 1. Checkout source ──────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up JDK ───────────────────────────────────────────
      - name: ☕ Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: maven

      # ── 3. Verify Maven is available ────────────────────────────
      - name: 🔍 Maven version
        run: mvn -v

      # ── 4. Compile (fail fast on syntax errors) ─────────────────
      - name: 🔨 Compile
        run: mvn -B -ntp compile

      # ── 5. Run unit tests ───────────────────────────────────────
      #     Uses H2 in-memory DB (test scope) so no MySQL needed.
      - name: 🧪 Run tests
        run: mvn -B -ntp test
        env:
          SPRING_PROFILES_ACTIVE: test

      # ── 6. Package the application (skip tests — already ran) ──
      - name: 📦 Package (no tests)
        run: mvn -B -ntp package -DskipTests

      # ── 7. Upload build artifact ────────────────────────────────
      - name: 📤 Upload JAR artifact
        if: matrix.java == '17'
        uses: actions/upload-artifact@v4
        with:
          name: cipherdrive-dna-mvp-${{ github.sha }}
          path: target/cipherdrive-dna-mvp-*.jar
          if-no-files-found: error
          retention-days: 14

  # ────────────────────────────────────────────────────────────────
  # Code quality gate — only on JDK 17 to avoid double work
  # ────────────────────────────────────────────────────────────────
  verify:
    name: Verify (lint + best-effort checks)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: ✅ Verify (no tests, just build checks)
        run: mvn -B -ntp verify -DskipTests
